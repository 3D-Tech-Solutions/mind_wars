name: mind_wars
description: Mind Wars - Async Multiplayer Cognitive Games Platform
publish_to: 'none'
version: 0.0.2+7

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Navigation
  cupertino_icons: ^1.0.2
  flutter_svg: ^2.0.7
  
  # State Management
  provider: ^6.0.5
  get_it: ^7.6.0
  
  # Networking & Multiplayer
  socket_io_client: ^2.0.3
  http: ^1.1.0
  
  # Local Storage
  shared_preferences: ^2.2.0
  sqflite: ^2.3.0
  path_provider: ^2.1.0

  # Image Handling
  image_picker: ^0.8.9
  
  # [2026-03-31 Integration] Lottie JSON renderer for the 4 branded motion assets:
  #   assets/branding/animations/anim_splash-assembly_1080x2340.json  (splash intro)
  #   assets/branding/animations/anim_loading-spinner_256.json        (loading spinner, loop)
  #   assets/branding/animations/anim_battle-countdown_1080.json      (battle countdown)
  #   assets/branding/system/anim_achievement-unlock_400.json         (achievement unlock)
  # Use BrandAnimations helper in lib/utils/brand_animations.dart.
  lottie: ^3.1.0
  
  # [2026-03-31 Integration] Video playback for original MP4 placeholders in
  # assets/branding/animations/ — kept for fallback until Lottie is wired everywhere.
  video_player: ^2.7.2
  
  # Utilities
  uuid: ^3.0.7
  intl: ^0.18.1
  equatable: ^2.0.5
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  mockito: ^5.4.2
  build_runner: ^2.4.6
  sqflite_common_ffi: ^2.3.0

flutter:
  uses-material-design: true
  
  # Assets
  # [2026-03-22 Maintenance] Expanded asset registration to cover all branding
  # subdirectories. Flutter requires each subdirectory to be listed separately —
  # a top-level entry like assets/branding/ only includes files at that exact level,
  # not recursively. Added assets/branding/animations/ for motion assets and
  # assets/branding/system/ for system-level assets like achievement-unlock.
  assets:
    - assets/words_small.json
    - assets/branding/
    - assets/branding/avatars/
    - assets/branding/badges/
    - assets/branding/icons/
    - assets/branding/logos/
    - assets/branding/onboarding/
    - assets/branding/system/
    - assets/branding/animations/
    - assets/games/
    - assets/games/attention/
    - assets/games/attention/focus-finder/
    - assets/games/language/
    - assets/games/logic/
    - assets/games/memory/
    - assets/games/memory/memory-match/
    - assets/games/spatial/
    - assets/fonts/
  
  # Fonts
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
