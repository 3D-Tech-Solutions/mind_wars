services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: eskienterprises-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mindwars}
      POSTGRES_USER: ${POSTGRES_USER:-mindwars}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env file}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    networks:
      - eskienterprises-mindwars-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mindwars}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: eskienterprises-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - eskienterprises-mindwars-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # REST API Server
  api-server:
    build:
      context: ./api-server
      dockerfile: Dockerfile
    container_name: eskienterprises-mindwars-api
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      API_PORT: ${API_PORT:-3000}
      API_HOST: ${API_HOST:-0.0.0.0}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-mindwars}
      POSTGRES_USER: ${POSTGRES_USER:-mindwars}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mindwars_password_change_in_production}
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      JWT_SECRET: ${JWT_SECRET:-change_this_secret_in_production_use_long_random_string}
      JWT_ACCESS_EXPIRY: ${JWT_ACCESS_EXPIRY:-15m}
      JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
    ports:
      - "${API_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - eskienterprises-mindwars-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Socket.io Multiplayer Server
  multiplayer-server:
    build:
      context: ./multiplayer-server
      dockerfile: Dockerfile
    container_name: eskienterprises-mindwars-multiplayer
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      MULTIPLAYER_PORT: ${MULTIPLAYER_PORT:-3001}
      MULTIPLAYER_HOST: ${MULTIPLAYER_HOST:-0.0.0.0}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-mindwars}
      POSTGRES_USER: ${POSTGRES_USER:-mindwars}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mindwars_password_change_in_production}
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      JWT_SECRET: ${JWT_SECRET:-change_this_secret_in_production_use_long_random_string}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "${MULTIPLAYER_PORT:-3001}:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - eskienterprises-mindwars-network

  # [2026-03-26 Integration] Gateway service for unified API and Socket.io access.
  #
  # Mobile testing notes and prior deployment docs expect a single entry point
  # on port 4000, so nginx is part of the runnable Docker stack here.
  nginx:
    image: nginx:1.27-alpine
    container_name: eskienterprises-nginx
    restart: unless-stopped
    depends_on:
      api-server:
        # [2026-03-26 Bugfix] The API health probe is currently flaky under Docker.
        #
        # The Express service is accepting requests on port 3000, so the gateway
        # should depend on the container starting rather than on the false-negative
        # health status.
        condition: service_started
      multiplayer-server:
        condition: service_started
    ports:
      - "4001:4000"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - eskienterprises-mindwars-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  eskienterprises-mindwars-network:
    driver: bridge
